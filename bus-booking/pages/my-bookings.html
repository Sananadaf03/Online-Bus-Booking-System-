<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Bookings — BusGo</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="navbar">
    <div class="logo"><a href="../index.html" style="text-decoration:none;color:inherit;">🚌 BusGo</a></div>
    <div class="nav-links">
      <a href="../index.html">Home</a>
      <a href="my-bookings.html" class="active">My Bookings</a>
    </div>
  </nav>

  <div class="bookings-page">
    <h1>My Bookings</h1>
    <p class="sub">All your bus tickets in one place.</p>

    <div id="bookingsList"></div>
  </div>

  <script src="../js/data.js"></script>
  <script>
    function renderBookings() {
      const bookings = BookingStore.getAll();
      const container = document.getElementById('bookingsList');

      if (bookings.length === 0) {
        container.innerHTML = `
          <div class="empty-bookings">
            <div class="icon">🚌</div>
            <p style="font-size:18px;font-weight:600;margin-bottom:8px;">No bookings yet</p>
            <p>Time to plan your next trip!</p>
            <a href="../index.html" style="display:inline-block;margin-top:20px;background:var(--accent);color:#fff;padding:12px 28px;border-radius:10px;text-decoration:none;font-family:var(--font-head);font-weight:700;">Search Buses →</a>
          </div>`;
        return;
      }

      container.innerHTML = bookings.map(b => `
        <div class="booking-item">
          <div>
            <div class="booking-route">${b.from} → ${b.to}</div>
            <div class="booking-meta">${formatDate(b.date)} · ${b.operator} · ${b.busType}</div>
            <div class="booking-meta">Seats: ${b.seats.join(', ')} · Dep: ${b.departure} → Arr: ${b.arrival}</div>
            <div class="booking-pnr">PNR: ${b.pnr}</div>
          </div>
          <div style="text-align:right;">
            <div class="booking-fare">₹${b.total.toLocaleString()}</div>
            <div class="booking-status ${b.status === 'Confirmed' ? 'status-confirmed' : 'status-cancelled'}">
              ${b.status === 'Confirmed' ? '✓ Confirmed' : '✗ Cancelled'}
            </div>
            ${b.status === 'Confirmed' ? `
              <button class="cancel-btn" onclick="cancelBooking('${b.pnr}')">Cancel Booking</button>
            ` : ''}
            <a href="confirmation.html?pnr=${b.pnr}" style="display:block;margin-top:6px;font-size:12px;color:var(--accent);text-decoration:none;">View Ticket →</a>
          </div>
        </div>
      `).join('');
    }

    function cancelBooking(pnr) {
      if (confirm('Are you sure you want to cancel this booking? A full refund will be processed.')) {
        BookingStore.cancel(pnr);
        renderBookings();
      }
    }

    renderBookings();
  </script>
</body>
</html>
